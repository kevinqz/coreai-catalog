        dtype: int32
    outputs:
    - name: text
      swift_type: String
      decoding:
        format_selector: fixed prompt prefix (assets/prompt_input_ids.i32) — output
          interleaves markdown, HTML tables and LaTeX formulas; not prompt-selectable
        detokenization: greedy decode to eos id 1; detokenize with tokenizer/ (LlamaTokenizerFast)
    files:
      tokenizer_ref: tokenizer
      processor_ref: assets/recipe.json
  notes: Document OCR to markdown; tables to HTML; formulas to LaTeX.
