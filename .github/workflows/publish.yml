name: Publish to PyPI

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install build twine
          pip install -r requirements.txt

      - name: Sync package data
        run: python scripts/sync_package_data.py

      - name: Validate before publish
        run: |
          python scripts/validate.py
          python scripts/audit.py

      - name: Build package
        run: |
          python -m build
          # Move build artifacts to avoid conflict with dist/*.json
          mkdir -p dist_pkg
          cp dist/coreai_catalog-* dist_pkg/

      - name: Publish to PyPI
        env:
          TWINE_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist_pkg/*
