name: Publish to PyPI

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    environment:
      name: pypi
      url: https://pypi.org/project/coreai-catalog/

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install build
          pip install -r requirements.txt

      - name: Sync package data
        run: python scripts/sync_package_data.py

      - name: Validate before publish
        run: |
          python scripts/validate.py
          python scripts/audit.py
          python scripts/check_counts.py

      - name: Build package
        run: |
          python -m build
          mkdir -p dist_pkg
          cp dist/coreai_catalog-* dist_pkg/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist_pkg/
