name: Source Monitor

on:
  schedule:
    # Every 3 hours at :00
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: source-monitor
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check sources and create issue if changes found
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Config
          LOOKBACK_HOURS=4  # slightly more than 3h schedule for overlap
          SINCE=$(date -u -d "${LOOKBACK_HOURS} hours ago" +"%Y-%m-%dT%H:%M:%SZ" 2>/dev/null || date -u -v-${LOOKBACK_HOURS}H +"%Y-%m-%dT%H:%M:%SZ")
          NOW_ISO=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          KNOWN_MODELS=$(grep -cE '^- id:' catalog.yaml 2>/dev/null || echo "0")
          if [[ "$KNOWN_MODELS" == "0" ]]; then
            KNOWN_MODELS=$(grep -cE '^  - id:' catalog.yaml 2>/dev/null || echo "0")
          fi

          CHANGES_FOUND=0
          REPORT=""
          REPORT+="## Source Monitor Report\n"
          REPORT+="**Period:** ${SINCE} → ${NOW_ISO}\n"
          REPORT+="**Catalog:** ${KNOWN_MODELS} models\n\n"

          # ── 1. GitHub repos: recent commits ──
          GH_REPOS=(
            "john-rocky/coreai-model-zoo"
            "apple/coreai-models"
            "john-rocky/apple-silicon-llm-bench"
            "john-rocky/coreai-samples"
            "gafiatulin/vibevoice-coreai"
            "mweinbach/NemotronCoreAI"
          )

          for repo in "${GH_REPOS[@]}"; do
            commits_json=$(curl -sf --max-time 15 \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${repo}/commits?since=${SINCE}&per_page=10" 2>/dev/null) || continue

            commit_count=$(echo "$commits_json" | jq 'length' 2>/dev/null || echo "0")

            if [[ "$commit_count" != "0" && "$commit_count" -gt 0 ]]; then
              CHANGES_FOUND=1
              REPORT+="### GitHub: ${repo}\n"
              REPORT+="${commit_count} new commit(s):\n\n"
              REPORT+="$(echo "$commits_json" | jq -r '.[] | "- \(.sha[0:7]) \(.commit.message | split("\n")[0]) (\(.commit.author.date))"' 2>/dev/null)\n\n"
            fi
          done

          # ── 2. HuggingFace: Core AI artifact accounts ──
          HF_ACCOUNTS=(
            "mlboydaisuke"
            "CarstenL"
            "Intiser"
            "warshanks"
            "bryanbblewis11"
            "lenitas"
          )

          for account in "${HF_ACCOUNTS[@]}"; do
            models_json=$(curl -sf --max-time 15 \
              "https://huggingface.co/api/models?author=${account}&sort=lastModified&direction=-1&limit=50" 2>/dev/null) || continue

            recent=$(echo "$models_json" | jq --arg since "$SINCE" \
              '[.[] | select(.lastModified > $since)] | length' 2>/dev/null || echo "0")

            if [[ "$recent" != "0" && "$recent" -gt 0 ]]; then
              CHANGES_FOUND=1
              REPORT+="### HuggingFace: ${account}\n"
              REPORT+="${recent} model(s) updated:\n\n"
              REPORT+="$(echo "$models_json" | jq --arg since "$SINCE" -r \
                '.[] | select(.lastModified > $since) | "- \(.id) (mod: \(.lastModified))"' 2>/dev/null)\n\n"
            fi
          done

          # ── 3. HuggingFace: upstream orgs ──
          HF_ORGS=(
            "Qwen"
            "google"
            "openai"
            "mistralai"
            "ibm-granite"
            "LiquidAI"
            "openbmb"
            "black-forest-labs"
          )

          for org in "${HF_ORGS[@]}"; do
            models_json=$(curl -sf --max-time 15 \
              "https://huggingface.co/api/models?author=${org}&sort=lastModified&direction=-1&limit=5" 2>/dev/null) || continue

            recent=$(echo "$models_json" | jq --arg since "$SINCE" \
              '[.[] | select(.lastModified > $since)] | length' 2>/dev/null || echo "0")

            if [[ "$recent" != "0" && "$recent" -gt 0 ]]; then
              CHANGES_FOUND=1
              REPORT+="### HF Upstream: ${org}\n"
              REPORT+="${recent} model(s) new/updated:\n\n"
              REPORT+="$(echo "$models_json" | jq --arg since "$SINCE" -r \
                '.[] | select(.lastModified > $since) | "- \(.id) (mod: \(.lastModified))"' 2>/dev/null)\n\n"
            fi
          done

          # ── 4. Model Zoo tree: count directories ──
          zoo_tree=$(curl -sf --max-time 15 \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/john-rocky/coreai-model-zoo/git/trees/main?recursive=1" 2>/dev/null) || zoo_tree=""

          if [[ -n "$zoo_tree" ]]; then
            zoo_models=$(echo "$zoo_tree" | jq -r '.tree[].path' 2>/dev/null | grep -cE '^zoo/[^/]+/$' || echo 0)
            official_models=$(echo "$zoo_tree" | jq -r '.tree[].path' 2>/dev/null | grep -cE '^official/[^/]+/$' || echo 0)
            zoo_models=$(echo "$zoo_models" | tr -d '[:space:]')
            official_models=$(echo "$official_models" | tr -d '[:space:]')
            [[ -z "$zoo_models" ]] && zoo_models=0
            [[ -z "$official_models" ]] && official_models=0
            total_tree=$((zoo_models + official_models))
            if [[ "$total_tree" -gt "$KNOWN_MODELS" ]]; then
              diff=$((total_tree - KNOWN_MODELS))
              CHANGES_FOUND=1
              REPORT+="### Core AI Model Zoo\n"
              REPORT+="Tree has ${total_tree} model directories vs ${KNOWN_MODELS} in catalog (+${diff} potentially new)\n\n"
            fi
          fi

          # ── Output ──
          if [[ "$CHANGES_FOUND" -eq 1 ]]; then
            REPORT+="---\n"
            REPORT+="Review findings and update \`catalog.yaml\` if new models are confirmed."
            # Create GitHub issue
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            echo -e "$REPORT" > /tmp/source-report.md
            gh issue create \
              --title "Source Monitor: changes detected ($TIMESTAMP)" \
              --label "source-monitor,automated" \
              --body-file /tmp/source-report.md
            echo "Issue created."
          else
            echo "No changes detected. All quiet."
          fi
