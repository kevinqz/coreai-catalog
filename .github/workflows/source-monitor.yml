name: Source Monitor

on:
  schedule:
    # Every 3 hours at :00
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: source-monitor
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run source monitor
        id: monitor
        run: |
          python3 scripts/source_monitor.py --format markdown > /tmp/source-report.md
          # Check if new models were found (exit code 1 = new models)
          python3 scripts/source_monitor.py --json > /tmp/source-report.json
          NEW_COUNT=$(python3 -c "import json; d=json.load(open('/tmp/source-report.json')); print(d['hf_new_count'])")
          echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
          cat /tmp/source-report.md

      - name: Create issue if new models detected
        if: steps.monitor.outputs.new_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create labels if they don't exist
          gh label create "source-monitor" --color "0052cc" --description "Automated source monitor" 2>/dev/null || true
          gh label create "new-models" --color "5319e7" --description "New models detected upstream" 2>/dev/null || true

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          NEW_COUNT=${{ steps.monitor.outputs.new_count }}

          gh issue create \
            --title "Source Monitor: ${NEW_COUNT} new model(s) detected (${TIMESTAMP})" \
            --label "source-monitor,new-models" \
            --body-file /tmp/source-report.md

      - name: No changes
        if: steps.monitor.outputs.new_count == '0'
        run: echo "No new models detected. All quiet."
