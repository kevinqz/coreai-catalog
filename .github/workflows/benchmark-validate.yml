name: Benchmark Validation

on:
  pull_request:
    paths:
      - 'benchmarks.jsonl'
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install jsonschema pyyaml cryptography

      # Enforce the lane rule CONTRIBUTING.md documents: a benchmark PR
      # touches benchmarks.jsonl and NOTHING else. Without this check a
      # mixed model+benchmark PR would pass both workflows (the curator
      # lane no longer hard-fails unsigned entries).
      - name: Check PR touches only benchmarks.jsonl
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD > /tmp/changed_files.txt
          OTHER=$(grep -v '^benchmarks\.jsonl$' /tmp/changed_files.txt || true)
          if [ -n "$OTHER" ]; then
            echo "::error::Benchmark PRs are a dedicated lane: exactly one added line in benchmarks.jsonl and no other file changes. This PR also changes: $(echo "$OTHER" | tr '\n' ' '). Split the non-benchmark changes into a separate model-lane PR."
            exit 1
          fi

      - name: Check PR adds exactly 1 line to benchmarks.jsonl
        id: linecheck
        run: |
          git diff origin/${{ github.base_ref }}...HEAD -- benchmarks.jsonl | grep '^+' | grep -v '^+++' > /tmp/new_lines.txt || true
          LINE_COUNT=$(wc -l < /tmp/new_lines.txt)
          echo "line_count=$LINE_COUNT" >> $GITHUB_OUTPUT
          if [ "$LINE_COUNT" -ne 1 ]; then
            echo "::error::PR must add exactly 1 line to benchmarks.jsonl, found $LINE_COUNT. Benchmark PRs are a dedicated lane: one added line, no other changes. Model PRs must never touch benchmarks.jsonl."
            exit 1
          fi

      # Route the submission: unsigned entries whose extraction_method is
      # upstream_readme_manual / upstream_readme_scripted go to the CURATOR
      # lane (label + comment + human review, CI passes). Everything else is
      # the RELAY lane, which keeps the strict signature + auto-merge gates.
      - name: Determine submission lane
        id: lane
        run: |
          python3 - <<'PYEOF'
          import json
          import os

          with open('/tmp/new_lines.txt') as f:
              line = f.read().strip().lstrip('+')

          lane = 'relay'
          reason = 'signed relay submission path (strict gates)'
          try:
              entry = json.loads(line)
              unsigned = '_signature' not in entry
              method = str(entry.get('extraction_method', ''))
              if unsigned and method.startswith('upstream_readme_'):
                  lane = 'curator'
                  reason = (
                      f"unsigned '{method}' entry — routed to the "
                      "curator review lane (no signature required)"
                  )
          except json.JSONDecodeError:
              reason = 'unparseable JSON — strict relay lane will report the error'

          print(f'Lane: {lane} ({reason})')
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'lane={lane}\n')
          PYEOF

      - name: Verify Ed25519 signature
        id: sigcheck
        if: steps.lane.outputs.lane != 'curator'
        run: |
          python3 scripts/verify_benchmark_signature.py /tmp/new_lines.txt

      - name: Validate schema + model_id cross-reference
        id: schemacheck
        # Curator-lane entries never hard-fail this workflow; schema problems
        # are surfaced in the PR comment (and still gate merge via validate.yml).
        continue-on-error: ${{ steps.lane.outputs.lane == 'curator' }}
        run: |
          python3 scripts/validate_benchmark_entry.py /tmp/new_lines.txt

      - name: Outlier check
        id: outliercheck
        continue-on-error: true
        run: |
          python3 scripts/outlier_check.py --input /tmp/new_lines.txt --catalog benchmarks.jsonl

      - name: Evaluate all 8 auto-merge gates
        id: gates
        if: steps.lane.outputs.lane == 'relay'
        run: |
          python3 - <<'PYEOF'
          import json, sys

          # Read the submitted entry
          with open('/tmp/new_lines.txt') as f:
              line = f.read().strip().lstrip('+')
          entry = json.loads(line)
          entry.pop('_signature', None)

          # Load catalog model IDs
          import yaml
          with open('catalog.yaml') as f:
              cat = yaml.safe_load(f)
          valid_ids = {m['id'] for m in cat.get('models', []) if 'id' in m}

          # Evaluate gates
          gates = {
              'schema_valid': True,  # If we got here, schema passed
              'model_id_exists': entry.get('model_id', '') in valid_ids,
              'signature_valid': True,  # If we got here, sig passed
              'device_verified': entry.get('device_verified', False),
              'extraction_method': entry.get('extraction_method') == 'app_benchmark_protocol',
              'outlier_pass': '${{ steps.outliercheck.outcome }}' == 'success',
              'thermal_ok': entry.get('environment', {}).get('thermal_state', 'unknown') in ('nominal', 'fair', 'unknown'),
              'not_duplicate': True,  # Checked below
          }

          # Duplicate check: same model_id + device_class + metric in last 7 days
          import datetime
          from collections import defaultdict
          cutoff = (datetime.date.today() - datetime.timedelta(days=7)).isoformat()
          with open('benchmarks.jsonl') as f:
              for existing_line in f:
                  existing_line = existing_line.strip()
                  if not existing_line or existing_line.startswith('#'):
                      continue
                  try:
                      existing = json.loads(existing_line)
                  except json.JSONDecodeError:
                      continue
                  if (existing.get('model_id') == entry.get('model_id') and
                      existing.get('device_class') == entry.get('device_class') and
                      existing.get('metric') == entry.get('metric') and
                      existing.get('observed_date', '') >= cutoff):
                      gates['not_duplicate'] = False
                      break

          # Output results
          all_pass = all(gates.values())
          failed = [k for k, v in gates.items() if not v]

          print(f'GATES_JSON={json.dumps(gates)}')
          print(f'ALL_PASS={all_pass}')
          print(f'FAILED_GATES={json.dumps(failed)}')

          # Write to GITHUB_OUTPUT
          with open('/tmp/gates.json', 'w') as f:
              json.dump(gates, f, indent=2)

          # Write comment section
          with open('/tmp/gates-comment.md', 'w') as f:
              f.write('### Auto-merge Gates\n\n')
              f.write('| Gate | Status |\n|---|---|\n')
              for gate, passed in gates.items():
                  icon = '✅' if passed else '❌'
                  f.write(f'| {gate} | {icon} |\n')
              f.write(f'\n**All gates pass:** {"✅ Yes — auto-merge eligible" if all_pass else "❌ No — needs curator review"}\n')

          print(f'ALL_GATES_PASS={str(all_pass).lower()}')
          with open('/tmp/all_gates.txt', 'w') as f:
              f.write(str(all_pass).lower())
          PYEOF

      - name: Build validation comment
        run: |
          cat /tmp/gates-comment.md >> /tmp/final-comment.md 2>/dev/null || true

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const lane = '${{ steps.lane.outputs.lane }}';
            let body = '## Benchmark Validation Results\n\n';

            if (lane === 'curator') {
              body += '**Lane: curator review** — unsigned `upstream_readme_*` submission.\n\n';
              body += 'This entry does not need a relay signature. It will not auto-merge: ';
              body += 'a curator will review the provenance and merge manually ';
              body += '(label: `benchmark-curator-review`).\n\n';
              body += '| Check | Result |\n|---|---|\n';
              body += `| Line count | ${{ steps.linecheck.outputs.line_count }} |\n`;
              body += `| Schema + model_id | ${{ steps.schemacheck.outcome == 'success' && '✅ Valid' || '⚠️ Invalid — please fix before curator review' }} |\n`;
              body += `| Outlier check | ${{ steps.outliercheck.outcome == 'success' && '✅ Pass' || '⚠️ Outlier or insufficient data' }} |\n`;
            } else {
              body += '| Check | Result |\n|---|---|\n';
              body += `| Line count | ${{ steps.linecheck.outputs.line_count }} |\n`;
              body += `| Ed25519 signature | ${{ steps.sigcheck.outcome == 'success' && '✅ Verified' || '❌ Failed' }} |\n`;
              body += `| Schema + model_id | ${{ steps.schemacheck.outcome == 'success' && '✅ Valid' || '❌ Invalid' }} |\n`;
              body += `| Outlier check | ${{ steps.outliercheck.outcome == 'success' && '✅ Pass' || '⚠️ Outlier or insufficient data' }} |\n\n`;

              try { body += fs.readFileSync('/tmp/gates-comment.md', 'utf-8'); } catch {}
            }

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.payload.pull_request.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Benchmark Validation Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                ...context.repo, comment_id: botComment.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: context.payload.pull_request.number, body,
              });
            }

      - name: Curator lane — label for review and pass
        if: steps.lane.outputs.lane == 'curator'
        run: |
          gh label create "benchmark-curator-review" \
            --description "Unsigned upstream_readme benchmark awaiting curator review" \
            --color FBCA04 2>/dev/null || true
          gh pr edit ${{ github.event.pull_request.number }} --add-label "benchmark-curator-review"
          echo "::notice::Curator review lane — unsigned upstream_readme_* benchmark accepted for human review. No signature is required for this lane; a curator will verify the upstream provenance and merge manually."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge if all gates pass
        if: >
          steps.lane.outputs.lane == 'relay' &&
          steps.sigcheck.outcome == 'success' &&
          steps.schemacheck.outcome == 'success'
        run: |
          ALL_PASS=$(cat /tmp/all_gates.txt 2>/dev/null || echo "false")
          if [ "$ALL_PASS" = "true" ]; then
            echo "All 8 gates passed — auto-merging"
            gh pr merge ${{ github.event.pull_request.number }} --squash --delete-branch --subject "benchmark: auto-merged (all gates passed)"
          else
            echo "Not all gates passed — needs curator review"
            gh pr edit ${{ github.event.pull_request.number }} --add-label "benchmark-needs-review"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label for review if gates fail
        if: >
          steps.lane.outputs.lane == 'relay' &&
          (steps.sigcheck.outcome != 'success' ||
          steps.schemacheck.outcome != 'success')
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-label "benchmark-needs-fixes"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
