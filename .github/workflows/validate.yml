name: Validate catalog

on:
  push:
  pull_request:
  schedule:
    # Weekly upstream sync check (Sundays 18:00 UTC)
    - cron: '0 18 * * 0'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - run: pip install -r requirements.txt

      # ── Schema validation + cross-references ──
      - name: Validate schemas and cross-references
        run: python scripts/validate.py

      # ── Data-quality audit (9 categories, zero unknowns) ──
      - name: Run data-quality audit
        run: python scripts/audit.py

      # ── Doc-test: docs examples + templates match the schemas ──
      - name: Validate documentation examples and templates against schemas
        run: |
          python scripts/doc_test.py
          python scripts/generate_templates.py --check

      # ── Count-sync: every public surface agrees with the data (README, site,
      #    llms.txt, agent.json, openapi) — the 79-vs-80-vs-81 drift guard. ──
      - name: Count-sync guard
        run: python scripts/check_counts.py

      # ── Generate docs + JSON + scores (single unified generator) ──
      - name: Generate all derived views
        run: |
          pip install -e ".[mcp]"
          python scripts/generate.py

      # ── Verify committed exports are in sync ──
      - name: Verify dist/ and docs/ are in sync
        run: git diff --exit-code docs/ dist/

      # ── CLI + MCP smoke test ──
      - name: CLI + MCP smoke test
        run: |
          coreai-catalog --version
          coreai-catalog --help
          coreai-catalog list --capability chat | head -5
          coreai-catalog list --capability chat --json | python -c "import json,sys; d=json.load(sys.stdin); m=d['models'][0]; assert 'artifact_url' in m, 'missing artifact_url'; assert 'devices_unknown' in m, 'missing devices_unknown'"
          coreai-catalog show qwen3-vl-2b
          coreai-catalog recommend --task "robot vision" --device iphone
          coreai-catalog recommend --task "translation" --json | python -c "import json,sys; d=json.load(sys.stdin); assert d['recommendations'], 'translation should resolve'"
          coreai-catalog scores | head -5
          coreai-catalog version --json | python -c "
          import json, sys, yaml
          d = json.load(sys.stdin)
          expected = yaml.safe_load(open('catalog.yaml'))['metadata']['version']
          assert d['version'] == expected, f'version mismatch: CLI={d[\"version\"]} catalog.yaml={expected}'
          print(f'Version OK: {d[\"version\"]}')
          "
          coreai-catalog doctor || true
          python -c "
          import sys, json; sys.path.insert(0, '.')
          from mcp_server.server import mcp
          tools = mcp._tool_manager._tools
          agent_json = json.load(open('agent.json'))
          expected = agent_json.get('mcp_server', {}).get('tools', len(tools))
          print(f'MCP tools: {len(tools)}')
          assert len(tools) == expected, f'Expected {expected} tools, got {len(tools)}'
          print('MCP server OK')
          "

      # ── Full test suite ──
      # Runs EVERY test module (not just error_resilience) so the P1 invariants —
      # bundle_kind/min_os required on every model, the fabric-lane contract test,
      # io_contract, hardening — are actually enforced in CI. pytest picks up
      # unittest-style tests too; keep the pip install pytest in requirements.
      - name: Full test suite
        run: python -m pytest tests/ -q

      # ── Sync gates ──
      - name: Ensure generated docs are in sync with YAML source
        run: git diff --exit-code docs/model-registry.md docs/artifact-provenance.md docs/apple-terminology-map.md docs/index.md

      - name: Verify JSON exports are non-empty
        run: |
          for f in dist/catalog.json dist/artifacts.json dist/benchmarks.json dist/sources.json dist/upstreams.json dist/terms.json dist/coreai-catalog.json dist/search-index.json dist/models.jsonl dist/readiness-scores.json; do
            if [ ! -s "$f" ]; then
              echo "ERROR: $f is empty or missing"
              exit 1
            fi
            echo "OK: $f ($(wc -c < "$f") bytes)"
          done

      # ── Upstream sync (informational, always passes) ──
      - name: Scan upstream for gaps
        run: python scripts/sync_upstream.py
        continue-on-error: true

      # ── PyPI smoke test (only on tag pushes) ──
      - name: PyPI install smoke test
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          pip install coreai-catalog --no-deps
          coreai-catalog version
          python -c "from coreai_catalog import Catalog; c = Catalog.load(); print(f'Models: {c.model_count}'); assert c.model_count > 70, 'model count too low'"
          coreai-catalog recommend --task "private OCR on iPhone" --license likely --json | python -c "import json,sys; d=json.load(sys.stdin); assert d['recommendations'], 'recommend failed'"

      # ── Publish ──
      - name: Upload JSON exports
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: coreai-catalog-json
          path: dist/
          retention-days: 30

      # ── Prompt-injection lint on catalog free-text fields (finding D6) ──
      - name: Injection lint (free-text fields)
        run: python scripts/injection_lint.py

  # Weekly scheduled job: upstream sync report as a GitHub issue
  sync-report:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: Generate upstream sync report
        run: python scripts/sync_upstream.py --json > /tmp/sync_report.json

      - name: Create issue from report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/sync_report.json', 'utf8'));
            const missing = report.missing_from_catalog || [];
            const unbenchmarked = report.unbenchmarked_models || [];
            const hfGaps = report.hf_artifacts_without_entries || [];

            if (missing.length === 0 && unbenchmarked.length === 0 && hfGaps.length === 0) {
              console.log('No gaps found — skipping issue creation');
              return;
            }

            let body = '## Weekly Upstream Sync Report\n\n';
            if (missing.length > 0) {
              body += `### Missing from catalog (${missing.length})\n`;
              for (const m of missing) body += `- **${m.name}**: ${m.hf_repo}\n`;
              body += '\n';
            }
            if (hfGaps.length > 0) {
              body += `### HF CoreAI artifacts without entries (${hfGaps.length})\n`;
              for (const r of hfGaps) body += `- ${r}\n`;
              body += '\n';
            }
            if (unbenchmarked.length > 0) {
              body += `### Models without benchmarks (${unbenchmarked.length})\n`;
              for (const id of unbenchmarked) body += `- ${id}\n`;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly sync: ${missing.length} missing, ${unbenchmarked.length} unbenchmarked`,
              body: body,
              labels: ['sync', 'upstream']
            });
