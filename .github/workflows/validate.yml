name: Validate catalog

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scripts/validate.py
      - run: python scripts/generate_docs.py
      - run: python scripts/generate_artifact_docs.py
      - run: python scripts/export_json.py
      - name: Ensure generated docs are in sync with YAML source
        run: git diff --exit-code docs/model-registry.md docs/artifact-provenance.md
